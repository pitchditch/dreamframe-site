<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" width="1600" height="560" role="img" aria-labelledby="title desc">
  <title id="title">Long aluminum gutter along asphalt shingles</title>
  <desc id="desc">A wide rooftop-style visual of a long aluminum gutter beside dark asphalt shingles, matching the open gutter style used in BC Pressure Washing reference photos.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="0.45" stop-color="#e8edf3"/>
      <stop offset="1" stop-color="#d5dee8"/>
    </linearGradient>
    <linearGradient id="gutterFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f9fb"/>
      <stop offset="0.45" stop-color="#dce3ea"/>
      <stop offset="1" stop-color="#aeb9c4"/>
    </linearGradient>
    <linearGradient id="gutterInside" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4c8ad"/>
      <stop offset="0.35" stop-color="#b9aa90"/>
      <stop offset="0.7" stop-color="#d9cfba"/>
      <stop offset="1" stop-color="#a99b84"/>
    </linearGradient>
    <linearGradient id="shingleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#232936"/>
      <stop offset="0.5" stop-color="#424957"/>
      <stop offset="1" stop-color="#171c27"/>
    </linearGradient>
    <pattern id="granules" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="#323947"/>
      <circle cx="5" cy="8" r="1.4" fill="#8e95a1" opacity="0.55"/>
      <circle cx="17" cy="5" r="1" fill="#c4c8ce" opacity="0.32"/>
      <circle cx="27" cy="18" r="1.7" fill="#080b10" opacity="0.35"/>
      <circle cx="10" cy="28" r="1.2" fill="#e1e4e8" opacity="0.22"/>
      <circle cx="23" cy="29" r="1" fill="#737b89" opacity="0.5"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1600" height="560" fill="url(#sky)"/>
  <path d="M0 380 C250 330 430 300 670 286 C980 268 1210 292 1600 246 L1600 560 L0 560 Z" fill="#5d8a3d" opacity="0.92"/>
  <path d="M0 0 H1190 L970 210 C715 250 420 302 0 362 Z" fill="url(#shingleGrad)"/>
  <path d="M0 0 H1190 L970 210 C715 250 420 302 0 362 Z" fill="url(#granules)" opacity="0.72"/>
  <g opacity="0.28" stroke="#111827" stroke-width="5">
    <path d="M40 85 H1110"/>
    <path d="M0 170 H1040"/>
    <path d="M0 255 H930"/>
    <path d="M140 0 V330"/>
    <path d="M345 0 V292"/>
    <path d="M550 0 V260"/>
    <path d="M755 0 V230"/>
    <path d="M960 0 V196"/>
  </g>

  <g transform="translate(-55 222) rotate(-8 820 130)" filter="url(#softShadow)">
    <path d="M70 124 C270 112 455 100 650 92 C930 80 1190 80 1540 95 L1514 200 C1146 182 840 183 560 200 C380 211 210 229 52 250 Z" fill="#d6dce2"/>
    <path d="M92 135 C305 121 510 111 710 105 C990 96 1238 99 1518 113 L1497 176 C1180 163 900 166 628 181 C420 193 240 211 78 231 Z" fill="url(#gutterInside)"/>
    <path d="M49 248 C254 221 456 203 665 192 C950 176 1238 176 1515 199 L1497 260 C1165 233 867 233 594 250 C395 263 214 285 33 315 Z" fill="url(#gutterFace)"/>
    <path d="M58 247 C260 222 455 205 665 193 C946 178 1237 179 1515 200" fill="none" stroke="#f8fafc" stroke-width="10" opacity="0.8"/>
    <path d="M40 315 C222 286 404 263 604 250 C877 233 1175 233 1498 260" fill="none" stroke="#8b98a5" stroke-width="7" opacity="0.75"/>

    <g stroke="#edf2f7" stroke-width="13" stroke-linecap="round" opacity="0.95">
      <path d="M225 130 L202 229"/>
      <path d="M455 112 L437 205"/>
      <path d="M685 104 L672 190"/>
      <path d="M915 99 L910 184"/>
      <path d="M1145 101 L1150 186"/>
      <path d="M1375 108 L1390 194"/>
    </g>
    <g fill="#7a5b35" opacity="0.38">
      <ellipse cx="250" cy="174" rx="13" ry="4"/>
      <ellipse cx="540" cy="151" rx="8" ry="3"/>
      <ellipse cx="840" cy="143" rx="11" ry="3.5"/>
      <ellipse cx="1260" cy="151" rx="9" ry="3"/>
    </g>
  </g>

  <path d="M0 0 H1600 V560 H0 Z" fill="#000" opacity="0.04" filter="url(#grain)"/>
  <rect x="0" y="0" width="1600" height="560" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
</svg>
